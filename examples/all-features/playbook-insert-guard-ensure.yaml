version: 1

input:
  root_dir: ./examples/all-features
  files:
    - main.tf

output:
  mode: target_dir
  target_dir: ./examples/all-features/out/insert-guard-ensure

options:
  workers: 1
  fail_on_no_change: false

edits:
  # Create missing target path first, then insert.
  - type: insert_hcl
    ensure_target_block: true
    guard:
      if_target_missing: true
    block:
      path: resource.google_container_node_pool.pool.node_config.shielded_instance_config
    hcl: |
      enable_secure_boot          = true
      enable_integrity_monitoring = true

  # Apply only if target exists.
  - type: insert_hcl
    guard:
      if_target_exists: true
    block:
      path: resource.google_container_node_pool.pool.management
    hcl: |
      auto_upgrade = false
