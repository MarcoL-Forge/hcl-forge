name: release-pr

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-pr:
    name: Create release PR
    runs-on: ubuntu-latest
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          target-branch: main
          skip-github-release: true
          token: ${{ env.RELEASE_TOKEN }}