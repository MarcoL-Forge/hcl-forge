name: tag-release

on:
  push:
    branches:
      - main
    paths:
      - ".release-please-manifest.json"

permissions:
  contents: write
  issues: write

jobs:
  tag-release:
    name: Tag release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '."."' .release-please-manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_exists
        run: |
          git fetch --tags
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release tag
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Mark release PR as tagged
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          TITLE="chore(main): release ${VERSION}"

          PR_NUMBER=$(curl -sS \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls?state=closed&base=main&per_page=100" \
            | jq -r --arg title "$TITLE" '.[] | select(.title == $title and .merged_at != null) | .number' \
            | head -n 1)

          if [ -z "${PR_NUMBER}" ]; then
            echo "No merged release PR found for version ${VERSION}; skipping label update"
            exit 0
          fi

          echo "Updating labels for release PR #${PR_NUMBER}"

          curl -sS -o /dev/null -w "%{http_code}" \
            -X DELETE \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/labels/autorelease:%20pending" \
            | grep -Eq '^(200|204|404)$'

          curl -sS -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/labels" \
            -d '{"labels":["autorelease: tagged"]}' \
            | grep -Eq '^(200|201)$'