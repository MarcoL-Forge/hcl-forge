name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release manually (for example v0.2.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve_tag
        run: |
          git fetch --tags

          TAG=""
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG=$(git tag --list 'v*' --sort=-version:refname | head -n 1)
          fi

          if [ -z "$TAG" ]; then
            echo "No release tag provided and no existing v* tag found."
            exit 1
          fi

          if ! git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Resolved tag does not exist: ${TAG}"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        run: |
          git checkout "refs/tags/${{ steps.resolve_tag.outputs.tag }}"
          git describe --tags --exact-match
          echo "Releasing from tag ${{ steps.resolve_tag.outputs.tag }}"

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Release
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: ~> v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
