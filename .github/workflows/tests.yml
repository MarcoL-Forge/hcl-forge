name: tests

on:
  push:
  pull_request:

jobs:
  go-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        run: go test -tags=integration ./...

      - name: E2E tests
        run: go test -tags=e2e ./cmd/hcl-forge
