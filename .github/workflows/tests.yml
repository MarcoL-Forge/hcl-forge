name: tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  go-tests:
    name: Go tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        run: go test -tags=integration ./...

      - name: E2E tests
        run: go test -tags=e2e ./cmd/hclforge

      - name: Build CLI
        run: go build -o hcl-forge ./cmd/hclforge